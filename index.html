<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Viewer</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:sans-serif;
}

#status{
    position:absolute;
    top:20px;
    left:20px;
    color:#00ffff;
    z-index:10;
    background:#111;
    padding:10px 15px;
    border-radius:12px;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<div id="status">Starting...</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165/build/three.module.js";

import { GLTFLoader }
from "https://cdn.jsdelivr.net/npm/three@0.165/examples/jsm/loaders/GLTFLoader.js";

import { OrbitControls }
from "https://cdn.jsdelivr.net/npm/three@0.165/examples/jsm/controls/OrbitControls.js";

const status = document.getElementById("status");

/* SCENE */
const scene = new THREE.Scene();

/* CAMERA */
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,1.5,4);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

/* CONTROLS */
const controls =
new OrbitControls(camera,renderer.domElement);

controls.enableDamping = true;

/* LIGHT */
const light = new THREE.HemisphereLight(
0xffffff,
0x444444,
3
);

scene.add(light);

/* GRID */
const grid = new THREE.GridHelper(10,10);

scene.add(grid);

/* LOADER */
const loader = new GLTFLoader();

status.innerHTML = "Loading model...";

/* LOAD MODEL */
loader.load(

"./model.glb",

function(gltf){

    const model = gltf.scene;

    scene.add(model);

    model.position.y = 0;

    model.scale.set(1,1,1);

    status.innerHTML = "MODEL SUCCESS";

    console.log("MODEL LOADED");

},

function(xhr){

    if(xhr.total){

        const p =
        (xhr.loaded/xhr.total*100).toFixed(0);

        status.innerHTML =
        "Loading " + p + "%";
    }

},

function(error){

    console.log(error);

    status.innerHTML =
    "ERROR: " + error.message;

}

);

/* ANIMATION */
function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();

/* RESIZE */
window.addEventListener("resize",()=>{

camera.aspect =
window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>
</body>
</html>
